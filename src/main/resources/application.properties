spring.application.name=plantify
spring.mvc.problemdetails.enabled=true
spring.jpa.hibernate.ddl-auto=validate

# Modularisierte Flyway Scripte
spring.modulith.runtime.flyway-enabled=true

# Manuelles "Vorspulen" der Zeit
# (normalerweise nur im Test)
spring.modulith.moments.enable-time-machine=true

management.endpoints.web.exposure.include=health,modulith
management.tracing.sampling.probability=1
management.otlp.metrics.export.enabled=true

management.tracing.export.enabled=false
# managment.tracing.export.zipkin.endpoint=http://localhost:9411/api/v2/spans

logging.level.nh.demo.plantify=DEBUG

# OpenAPI / Swagger UI
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.try-it-out-enabled=true

